<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elTavito:) | Terminal Pro</title>
    <style>
        :root {
            --rojo-gamer: #ff003c;
            --rojo-glow: rgba(255, 0, 60, 0.4);
            --fondo-negro: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--fondo-negro);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1. ANIMACIÓN DE FONDO (PARTÍCULAS) */
        .background-dots {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--rojo-glow) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: move-bg 20s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }

        /* 2. EFECTO SCANLINE (Línea de monitor) */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 5;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 0, 60, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        /* 3. TARJETA GLASSMORPISM */
        .card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 60, 0.2);
            padding: 4rem 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        /* 4. TEXTO NEÓN */
        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 10px var(--rojo-gamer), 0 0 30px var(--rojo-gamer);
            animation: flicker 4s infinite alternate;
        }

        .status-text {
            color: var(--rojo-gamer);
            font-family: 'Courier New', monospace;
            display: block;
            margin-top: 15px;
            letter-spacing: 3px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 5. BOTÓN GAMER */
        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--rojo-gamer);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn:hover {
            background: var(--rojo-gamer);
            box-shadow: 0 0 30px var(--rojo-gamer);
            color: black;
        }

        /* 6. EFECTO FLICKER (NEÓN REALISTA) */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 10px var(--rojo-gamer), 0 0 30px var(--rojo-gamer); }
            20%, 24%, 55% { opacity: 0.4; text-shadow: none; }
        }

    </style>
</head>
<body>

    <div class="background-dots"></div>
    <div class="scanline"></div>

    <div class="card">
        <h1>elTavito:)</h1>
        <span class="status-text">> MECATRÓNICA_OS_V1.0</span>
        <p style="opacity: 0.6; font-size: 0.8rem; margin-top: 20px;">[ WEB DEVELOPER | COD STREAMER ]</p>
        <a href="#" class="btn">INICIAR SESIÓN</a>
    </div>

</body>
</html>
