<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>elTavito.tech | Ingeniería & Diseño Web</title>
    
    <meta name="description" content="Soluciones de Ingeniería Web y Optimización por Sandra.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --fondo: #121418;
            --tarjeta: #1a1d24;
            --oro: #c5a059;
            --oro-glow: rgba(197, 160, 89, 0.2);
            --texto: #e0e0e0;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            text-decoration: none !important; 
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1; /* Fondo */
        }

        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(18, 20, 24, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0; z-index: 1000;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        nav ul { display: flex; justify-content: center; list-style: none; gap: 20px; }
        nav a { color: #a0a0a0; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; font-weight: 600; }

        .hidden { opacity: 0; transform: translateY(15px); transition: all 0.6s ease-out; }
        .show { opacity: 1 !important; transform: translateY(0) !important; }

        section { padding: 100px 20px; max-width: 1100px; margin: 0 auto; text-align: center; position: relative; z-index: 10; }
        .section-title { font-size: 2rem; color: var(--oro); margin-bottom: 50px; letter-spacing: 5px; text-transform: uppercase; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: clamp(1.8rem, 8vw, 5rem); color: white; letter-spacing: 5px; }
        .hero h1 span { color: var(--oro); font-weight: 700; }

        /* --- FORMULARIO FIX --- */
        form { 
            max-width: 550px; 
            margin: 0 auto; 
            text-align: left; 
            background: var(--tarjeta); 
            padding: 30px; 
            border-radius: 8px;
            position: relative;
            z-index: 50; /* Por encima de todo */
        }

        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: #0d0f12; border: 1px solid rgba(255,255,255,0.1);
            color: white; font-family: inherit;
            font-size: 16px !important; /* Evita zoom en iPhone */
            border-radius: 4px;
            -webkit-appearance: none;
        }

        .btn-gold {
            display: inline-block; width: 100%; padding: 18px;
            background: transparent; color: var(--oro);
            outline: 1px solid var(--oro); outline-offset: -1px;
            border: none !important; text-transform: uppercase;
            letter-spacing: 3px; font-weight: 600; 
            cursor: pointer;
            pointer-events: auto !important; /* Asegura que reciba el toque */
            position: relative;
            z-index: 100; /* Prioridad máxima de clic */
            transition: 0.3s;
        }
        .btn-gold:hover { background: var(--oro); color: #121418; }

        footer { padding: 40px; text-align: center; position: relative; z-index: 10; border-top: 1px solid rgba(197, 160, 89, 0.1); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <section class="hero" id="inicio">
        <h1 class="hidden">ELTAVITO<span>.TECH</span></h1>
        <p class="hidden">Ingeniería & Diseño Web Premium</p>
    </section>

    <section id="contacto">
        <h2 class="section-title hidden">Contacto</h2>
        
        <form name="contacto-tavito" action="gracias.html" method="POST" data-netlify="true" class="hidden">
            <input type="hidden" name="form-name" value="contacto-tavito" />
            
            <input type="text" name="nombre" placeholder="Tu Nombre" required>
            <input type="email" name="email" placeholder="Tu Email" required>
            <textarea name="mensaje" rows="4" placeholder="Tu mensaje..." required></textarea>
            
            <button type="submit" class="btn-gold">ENVIAR PROPUESTA</button>
        </form>
    </section>

    <footer>
        <p style="color: #a0a0a0; font-size: 0.8rem;">&copy; 2026 elTavito.tech | Sandra</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#c5a059" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c5a059", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "repulse" } } }
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
    </script>
</body>
</html>
