<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>elTavito.tech | Pro</title>
    <style>
        :root {
            --fondo: #121418;
            --tarjeta: #1a1d24;
            --oro: #c5a059;
            --texto: #e0e0e0;
        }

        /* RESET TOTAL PARA EVITAR LÍNEAS EXTRAÑAS */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            text-decoration: none !important; /* Mata cualquier subrayado */
            border: none;
            outline: none;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ANIMACIÓN MÁS SIMPLE PARA QUE NO FALLE */
        .hidden {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(2rem, 7vw, 5rem);
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: white;
            margin-bottom: 20px;
        }

        .hero h1 span { color: var(--oro); font-weight: 700; }

        /* BOTÓN LIMPIO SIN LÍNEAS */
        .btn-gold {
            display: inline-block;
            padding: 15px 30px;
            background: transparent;
            border: 1px solid var(--oro) !important; /* Forzamos solo el borde dorado */
            color: var(--oro);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* SECCIÓN SERVICIOS */
        .services {
            padding: 60px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            background-color: var(--tarjeta);
            padding: 40px 25px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .service-card h3 {
            color: var(--oro);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* MEDIA QUERIES PARA MÓVIL */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; letter-spacing: 3px; }
            .service-card { padding: 30px 20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <p class="hidden" style="letter-spacing: 5px; color: var(--oro); margin-bottom: 10px;">SOLUCIONES DIGITALES</p>
        <h1 class="hidden">ELTAVITO<span>.TECH</span></h1>
        <a href="#servicios" class="btn-gold hidden">EXPLORAR MÓDULOS</a>
    </section>

    <section class="services" id="servicios">
        <div class="services-grid">
            <div class="service-card hidden">
                <h3>DISEÑO WEB PRO</h3>
                <p>Creación de plataformas de alto impacto visual y rendimiento optimizado.</p>
            </div>
            <div class="service-card hidden">
                <h3>OPTIMIZACIÓN</h3>
                <p>Análisis y mejora de tiempos de carga y SEO avanzado.</p>
            </div>
            <div class="service-card hidden">
                <h3>INGENIERÍA</h3>
                <p>Implementación de sistemas y flujos tecnológicos personalizados.</p>
            </div>
        </div>
    </section>

    <script>
        // OBSERVADOR MEJORADO PARA MÓVIL
        const observerOptions = {
            root: null,
            threshold: 0.05, // Se activa con solo ver un 5% del elemento
            rootMargin: '0px 0px 50px 0px' // Se activa un poco antes de llegar
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
    </script>
</body>
</html>
