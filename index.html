<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elTavito:) | Centro de Control</title>
    <style>
        /* 1. VARIABLES: Como en Mecatrónica, definimos los parámetros primero */
        :root {
            --rojo-gamer: #ff003c;
            --rojo-glow: rgba(255, 0, 60, 0.5);
            --fondo-oscuro: #0a0a0a;
            --cristal: rgba(255, 255, 255, 0.05);
        }

        /* 2. RESET Y CUERPO */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--fondo-oscuro);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Evita scroll innecesario */
        }

        /* 3. EL CONTENEDOR "GLASS" (Efecto cristal) */
        .card {
            background: var(--cristal);
            backdrop-filter: blur(15px); /* Desenfoque de fondo */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            position: relative;
        }

        /* 4. EL LOGO NEÓN CON ANIMACIÓN */
        h1 {
            font-size: 4rem;
            margin: 0;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Efecto de luz roja */
            text-shadow: 
                0 0 10px var(--rojo-gamer),
                0 0 20px var(--rojo-gamer),
                0 0 40px var(--rojo-glow);
            animation: flicker 2s infinite alternate;
        }

        /* 5. SUBTÍTULO ESTILO CÓDIGO */
        .status {
            color: var(--rojo-gamer);
            font-family: 'Courier New', Courier, monospace;
            margin-top: 1rem;
            display: block;
            font-weight: bold;
        }

        /* 6. ANIMACIÓN DE PARPADEO (Flicker) */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
            }
            20%, 22%, 24%, 55% {
                opacity: 0.5; /* Simula un neón fallando un poco, muy industrial */
            }
        }

        /* 7. BOTÓN PRO */
        .btn {
            margin-top: 2rem;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--rojo-gamer);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background: var(--rojo-gamer);
            box-shadow: 0 0 20px var(--rojo-gamer);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>elTavito:)</h1>
        <span class="status">_SYSTEM_ONLINE [MECATRÓNICA]</span>
        <p>Desarrollo Web | Gaming | Ingeniería</p>
        <a href="#" class="btn">Entrar al Servidor</a>
    </div>

</body>
</html>
